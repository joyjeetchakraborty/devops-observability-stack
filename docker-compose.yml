version: "3.9"

services:

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ${PROJECT_NAME:-monitoring}-cadvisor
    ports:
     - "${CADVISOR_PORT:-8181}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    user: root
    networks:
      - monitoring_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ${PROJECT_NAME:-monitoring}-node_exporter
    pid: "host"
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    restart: unless-stopped
    networks:
      - monitoring_network

  nginx-prometheus-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: ${PROJECT_NAME:-monitoring}-nginx_exporter
    ports:
      - "${NGINX_EXPORTER_PORT:-9113}:9113"
    environment:
      - SCRAPE_URI=http://${NGINX_STATUS_HOST:-localhost}:${NGINX_STATUS_PORT:-80}/stub_status
    command:
      - "-nginx.scrape-uri=${SCRAPE_URI}"
    restart: unless-stopped
    networks:
      - monitoring_network
  
  apache_exporter:
    image: lusitaniae/apache-exporter:latest
    container_name: ${PROJECT_NAME:-monitoring}-apache_exporter
    command:
      - SCRAPE_URI=http://${APACHE_STATUS_HOST:-localhost}:${APACHE_STATUS_PORT:-80}/server-status?auto
    ports:
      - "${APACHE_EXPORTER_PORT:-9117}:9117"
    restart: unless-stopped
    networks:
      - monitoring_network


  promtail:
    image: grafana/promtail:latest
    container_name: ${PROJECT_NAME:-monitoring}-promtail
    ports:
      - "${PROMTAIL_PORT:-9080}:9080"
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /etc/promtail:/etc/promtail
      - /etc/promtail/positions.yml:/etc/promtail/positions.yml
    command:
      - --config.file=/etc/promtail/promtail-config.yml
    restart: unless-stopped
    networks:
      - monitoring_network

networks:
  monitoring_network:
    driver: bridge
